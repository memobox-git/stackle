# Netlify config for Stackle.
#
# Function timeout is set by your Netlify plan, not this file:
#   - Free:    10s  (too short for most LLM calls — expect timeouts on Fix)
#   - Pro:     26s  (covers most cases; heavy Fix All may still cut off)
#   - Enterprise: configurable
#
# If free-plan timeouts cause issues, either upgrade to Pro or migrate to
# Vercel Hobby (free, 60s default).

[build]
  command = "npm run build"
  publish = ".next"
